# =============================================================================
# Wagenbreth-Blanke Equation — Ethanol-Water Mixture Density
# =============================================================================
#
# Source: OIML International Recommendation R 22 (1975)
#         "International Alcoholometric Tables"
#         https://www.oiml.org/en/files/pdf_r/r022-e75.pdf
#
# Original publication: Wagenbreth, H. and Blanke, W. (1971)
#         "Die Dichte des Wassers im Internationalen Einheitensystem und in
#          der Internationalen Praktischen Temperaturskala von 1968"
#         PTB-Mitteilungen 81, pp. 412–415
#
# This file contains the full polynomial equation and all 54 coefficients
# for computing the density of ethanol-water mixtures as a function of
# ethanol mass fraction and temperature.
#
# Coefficients verified against the OIML R22 PDF and cross-checked against
# an independent ODS source file derived from the same document.
# =============================================================================


[metadata]

title       = "Wagenbreth-Blanke Ethanol-Water Density Polynomial"
source      = "OIML International Recommendation R 22 (1975)"
source_url  = "https://www.oiml.org/en/files/pdf_r/r022-e75.pdf"
authors     = ["Wagenbreth, H.", "Blanke, W."]
year        = 1971
standard    = "OIML R22 (1975)"
num_coefficients = 54
date_created     = "2026-04-04"   # ISO 8601: date this file was created and coefficients verified
date_note        = "Date refers to file creation and verification, not to the original OIML R22 publication (1975) or the Wagenbreth-Blanke paper (1971)."


# =============================================================================
# EQUATION DESCRIPTION
# =============================================================================
#
# The density rho of an ethanol-water mixture is given by:
#
#   rho(p, t) = A_1
#             + sum_{k=2}^{12}  A_k * p^(k-1)
#             + sum_{k=1}^{6}   B_k * (t - 20)^k
#             + sum_{i=1}^{5}   sum_{k=1}^{m_i}  C_{i,k} * p^k * (t - 20)^i
#
# Variables:
#   p    = mass fraction of ethanol, dimensionless, range 0.0 to 1.0
#          (e.g. p = 0.40 means 40% ethanol by mass)
#   t    = temperature in degrees Celsius
#   rho  = density of the mixture in kg/m3
#          (divide by 1000 to get g/mL)
#
# The equation has three groups of terms:
#
#   A terms — pure concentration effect at the reference temperature of 20°C.
#             These describe how density varies with ethanol content
#             when temperature is fixed at exactly 20°C.
#             A_1 alone (998.20123 kg/m3) is the density of pure water at 20°C.
#
#   B terms — pure thermal expansion of the mixture along the water axis.
#             These describe how density changes with temperature when
#             there is no ethanol present (p = 0, pure water).
#             The expansion is referenced to 20°C, so (t - 20) appears.
#
#   C terms — interaction (cross) terms coupling concentration and temperature.
#             These capture the fact that the thermal expansion coefficient
#             of the mixture is not a simple linear combination of the pure
#             components — it depends on both p and t simultaneously.
#             C_{i,k} multiplies p^k * (t-20)^i.
#
# =============================================================================

[equation]

# Valid temperature range (degrees Celsius)
temperature_min_C = -20.0
temperature_max_C =  40.0

# Valid mass fraction range (dimensionless, 0 = pure water, 1 = pure ethanol)
mass_fraction_min = 0.0
mass_fraction_max = 1.0

# Output quantity and units
output_quantity = "density"
output_units    = "kg/m3"

# Reference temperature for the A and C terms (degrees Celsius)
# All concentration-dependent terms are anchored to this temperature.
reference_temperature_C = 20.0

# The C matrix is not square — it is truncated. Each row i (i = 1..5)
# only has coefficients up to a maximum power of p given by m_i below.
# Beyond that limit the coefficients are zero and are omitted.
#   i=1 (t-20)^1 terms: k runs 1 to m1 = 11
#   i=2 (t-20)^2 terms: k runs 1 to m2 = 10
#   i=3 (t-20)^3 terms: k runs 1 to m3 =  9
#   i=4 (t-20)^4 terms: k runs 1 to m4 =  4
#   i=5 (t-20)^5 terms: k runs 1 to m5 =  2
truncation_limits = [11, 10, 9, 4, 2]   # m1, m2, m3, m4, m5


# =============================================================================
# A COEFFICIENTS
# =============================================================================
# Units: kg/m3 (each A_k has units such that A_k * p^(k-1) gives kg/m3,
#        since p is dimensionless)
#
# There are 12 A coefficients (k = 1 to 12), giving powers p^0 through p^11.
# A_1 = 998.20123 is the density of pure water at 20°C in kg/m3 — it is
# the constant term (p^0) and sets the baseline for the entire polynomial.
#
# The remaining A_k coefficients (k = 2..12) describe the nonlinear
# departure from pure water as ethanol content increases, all at 20°C.
#
# List index 0 = A_1 (constant term, p^0)
# List index 1 = A_2 (coefficient of p^1)
# ...
# List index 11 = A_12 (coefficient of p^11)

[coefficients.A]
units = "kg/m3"
description = "Concentration terms at 20°C. Index 0 = A_1 (constant, pure water density at 20°C), index k-1 = A_k (coefficient of p^(k-1))."

values = [
     998.20123,      # A_1  — pure water density at 20°C (kg/m3); constant term (p^0)
    -192.9769495,    # A_2  — coefficient of p^1
     389.1238958,    # A_3  — coefficient of p^2
   -1668.103923,     # A_4  — coefficient of p^3
   13522.15441,      # A_5  — coefficient of p^4
  -88292.78388,      # A_6  — coefficient of p^5
  306287.4042,       # A_7  — coefficient of p^6
 -613838.1234,       # A_8  — coefficient of p^7
  747017.2998,       # A_9  — coefficient of p^8
 -547846.1354,       # A_10 — coefficient of p^9
  223446.0334,       # A_11 — coefficient of p^10
  -39032.85426       # A_12 — coefficient of p^11
]


# =============================================================================
# B COEFFICIENTS
# =============================================================================
# Units: kg/(m3 · °C^k) where k is the power of (t-20)
#
# There are 6 B coefficients (k = 1 to 6), giving powers (t-20)^1 through
# (t-20)^6. Note there is no B_0 term — the (t-20)^0 = constant contribution
# at p=0 is already captured by A_1.
#
# These terms apply to the whole mixture but are derived from the behaviour
# of pure water (p=0). At p=0 the C terms vanish and the density reduces to:
#   rho(0, t) = A_1 + B_1*(t-20) + B_2*(t-20)^2 + ... + B_6*(t-20)^6
# which is a standalone polynomial for pure water density vs temperature.
#
# List index 0 = B_1 (coefficient of (t-20)^1)
# List index 5 = B_6 (coefficient of (t-20)^6)

[coefficients.B]
units = "kg/(m3·°C^k)"
description = "Pure thermal expansion terms (water axis). Index 0 = B_1 (coefficient of (t-20)^1), index k-1 = B_k."

values = [
  -0.20618513,      # B_1 — coefficient of (t-20)^1
  -0.0052682542,    # B_2 — coefficient of (t-20)^2
   3.6130013e-05,   # B_3 — coefficient of (t-20)^3
  -3.8957702e-07,   # B_4 — coefficient of (t-20)^4
   7.169354e-09,    # B_5 — coefficient of (t-20)^5
  -9.9739231e-11    # B_6 — coefficient of (t-20)^6
]


# =============================================================================
# C COEFFICIENTS (INTERACTION / CROSS TERMS)
# =============================================================================
# Units: kg/(m3 · °C^i) where i is the temperature power
#        (p is dimensionless so the p^k factor does not contribute units)
#
# C_{i,k} is the coefficient of the term:  p^k * (t-20)^i
#
#   i = temperature interaction order (1 to 5), i.e. power of (t-20)
#   k = concentration order (1 to m_i),         i.e. power of p
#
# The C matrix is stored here as five separate arrays C1 through C5,
# one per temperature interaction order i.
# Within each array, index 0 = k=1, index 1 = k=2, etc.
#
# Each array is truncated at k = m_i (see truncation_limits above).
# Coefficients beyond m_i are exactly zero and not stored.


# --- C1: temperature interaction order i=1, terms p^k * (t-20)^1, k=1..11 ---

[coefficients.C1]
temperature_power = 1     # power of (t-20) for all terms in this group
max_concentration_power = 11   # m1; k runs from 1 to 11
units = "kg/(m3·°C)"
description = "Interaction terms for (t-20)^1. Index 0 = C_{1,1} (coefficient of p^1*(t-20)^1), index k-1 = C_{1,k}."

values = [
   0.1693443461530087,   # C_{1,1}  — p^1  * (t-20)^1
 -10.46914743455169,     # C_{1,2}  — p^2  * (t-20)^1
  71.96353469546523,     # C_{1,3}  — p^3  * (t-20)^1
-704.7478054272792,      # C_{1,4}  — p^4  * (t-20)^1
3924.090430035045,       # C_{1,5}  — p^5  * (t-20)^1
-12101.64659068747,      # C_{1,6}  — p^6  * (t-20)^1
 22486.46550400788,      # C_{1,7}  — p^7  * (t-20)^1
-26055.62982188164,      # C_{1,8}  — p^8  * (t-20)^1
 18523.73922069467,      # C_{1,9}  — p^9  * (t-20)^1
 -7420.201433430137,     # C_{1,10} — p^10 * (t-20)^1
  1285.617841998974      # C_{1,11} — p^11 * (t-20)^1
]


# --- C2: temperature interaction order i=2, terms p^k * (t-20)^2, k=1..10 ---

[coefficients.C2]
