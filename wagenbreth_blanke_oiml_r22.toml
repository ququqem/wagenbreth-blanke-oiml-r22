# =============================================================================
# IMPLEMENTATION NOTES
# =============================================================================
#
# CONVERTING MASS FRACTION TO % v/v:
#   The equation uses mass fraction p, not volume fraction (% v/v).
#   % v/v is defined as: (volume of ethanol / total volume) * 100
#   where all volumes are measured at the reference temperature.
#
#   To convert % v/v to mass fraction at temperature t:
#     p = (vv/100) * rho_mixture(p, t) / rho_pure_ethanol(t)
#   This is implicit in p, so Newton iteration is required.
#
# EFFICIENT EVALUATION (HORNER'S METHOD):
#   The triple sum can be reorganised as a nested polynomial:
#     rho = sum_{k=0}^{11} [ f_k(t) ] * p^k
#   where f_k(t) is itself a polynomial in (t-20).
#   Horner's method applied to both the inner and outer polynomials
#   minimises the number of multiplications and avoids computing
#   integer powers explicitly.
#
# UNIT CONVERSION:
#   rho [g/mL] = rho [kg/m3] / 1000
#
# TEMPERATURE:
#   All temperatures must be in degrees Celsius.
#   The polynomial is anchored to t = 20°C (i.e. (t-20) = 0 at 20°C).
