max_concentration_power = 10   # m2
units = "kg/(m3·°C^2)"
description = "Interaction terms for (t-20)^2. Index 0 = C_{2,1}, index k-1 = C_{2,k}."

values = [
  -0.01193013005057010,  # C_{2,1}  — p^1  * (t-20)^2
